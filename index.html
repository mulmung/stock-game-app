.holdings-table{border-top:1px solid var(--line);margin-top:12px}

.hold-stock-row{padding:12px 0;cursor:pointer}
.hold-stock-name{font-size:15px;font-weight:950;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hold-two{text-align:right;line-height:1.25}
.hold-main{font-size:14px;font-weight:950;letter-spacing:-.35px}
.hold-sub{font-size:13px;font-weight:950;margin-top:4px;letter-spacing:-.25px}
.hold-main.pos,.hold-sub.pos{color:var(--red)}
.hold-main.neg,.hold-sub.neg{color:var(--blue)}
.hold-main.zero,.hold-sub.zero{color:var(--muted)}
.hold-arrow{color:#98a7ba;font-size:22px;text-align:right}
.hold-actions{display:flex;gap:8px;padding:10px 0 0}
.hold-detail-box{border-bottom:1px solid var(--line);padding:10px 0 12px}


.hold-stock-type{font-size:11px;color:var(--muted);font-weight:900;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}


.hold-name-cell{min-width:0;overflow:hidden}
.hold-stock-type{display:block;font-size:11px;color:var(--muted);font-weight:900;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}


.stock-table{border-top:1px solid var(--line);margin-top:4px}

.stock-head{padding:9px 0;color:var(--muted);font-size:11px;font-weight:950;text-align:center}
.stock-head div:first-child{text-align:left}
.stock-row{padding:10px 0;cursor:pointer}
.stock-name-cell{min-width:0;overflow:hidden}
.stock-row-name{font-size:15px;font-weight:950;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stock-row-type{font-size:11px;color:var(--muted);font-weight:900;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.stock-mini-chart svg{width:100%;height:42px;display:block}
.stock-price-cell{text-align:right}
.stock-price-main{font-size:15px;font-weight:950;letter-spacing:-.35px}
.stock-change-cell{text-align:right;line-height:1.22}
.stock-change-money{font-size:12px;font-weight:950;letter-spacing:-.25px;white-space:nowrap}
.stock-change-rate{font-size:12px;font-weight:950;margin-top:3px}
.stock-arrow{color:#98a7ba;font-size:19px;text-align:right}
.stock-detail-panel{border-bottom:1px solid var(--line);padding:10px 0 14px}
.stock-detail-panel .range-tabs{margin-top:2px}
.stock-detail-panel .chart{margin-top:10px}


.stock-screen{padding:16px 0}
.stock-full{background:transparent;border:0;border-radius:0;box-shadow:none;margin:0}
.stock-screen .stock-table{border-top:1px solid var(--line);margin:0;background:#fff}
.stock-screen .stock-head,
.stock-screen .stock-row{padding-left:18px;padding-right:18px}
.stock-screen .stock-detail-panel{padding-left:18px;padding-right:18px;background:#fff}

/* v94 - 플로팅 버튼/하단바 터치 영역 및 하단 정보바 정리 */
:root{
  --nav:88px;
}

/* 모든 화면에서 하단 고정바 때문에 마지막 요소가 안 눌리는 문제 방지 */
.main{
  padding-bottom:calc(var(--nav) + 28px + env(safe-area-inset-bottom)) !important;
}

/* 오른쪽 플로팅 계열 부모가 있을 경우 빈 영역 터치 방해 방지 */
.floating-actions,
.float-actions,
.floating-area{
  pointer-events:none !important;
}

/* 10초 타이머는 보이기만 하고 터치 영역은 먹지 않음 */
.chart-timer{
  bottom:calc(var(--nav) + 76px + env(safe-area-inset-bottom)) !important;
  width:56px !important;
  height:56px !important;
  z-index:31 !important;
  pointer-events:none !important;
}

/* 돈주머니 버튼은 실제 버튼만 터치 가능 */
.earn{
  bottom:calc(var(--nav) + 12px + env(safe-area-inset-bottom)) !important;
  width:56px !important;
  height:56px !important;
  z-index:32 !important;
  pointer-events:auto !important;
  touch-action:manipulation;
}

/* 하단 고정바 높이 축소 + 보이지 않는 터치 영역 최소화 */
.bottom-status{
  height:calc(var(--nav) + env(safe-area-inset-bottom)) !important;
  grid-template-columns:52px minmax(0,1fr) auto !important;
  grid-template-rows:34px 26px !important;
  align-items:center !important;
  gap:0 !important;
  padding:8px 14px calc(8px + env(safe-area-inset-bottom)) !important;
  pointer-events:auto;
  box-sizing:border-box;
}

/* 메뉴 버튼은 실제 버튼 크기만 터치 */
.menu-toggle{
  width:44px !important;
  
  grid-row:1 / span 2 !important;
  align-self:center !important;
  touch-action:manipulation;
}

/* 닉네임/승급 영역 압축 */
.bottom-info{
  min-width:0;
  padding:0 10px !important;
  border-left:1px solid var(--line);
  align-self:end !important;
}

.bottom-nick{
  font-size:15px !important;
  line-height:1.1 !important;
}

.bottom-title{
  margin-top:2px !important;
  font-size:11px !important;
  line-height:1.1 !important;
}

/* 보유 금액 배경 제거 */
.bottom-cash{
  background:transparent !important;
  border:0 !important;
  box-shadow:none !important;
  border-radius:0 !important;
  padding:0 0 0 10px !important;
  align-self:end !important;
  font-size:18px !important;
  line-height:1.1 !important;
  color:var(--deep) !important;
  white-space:nowrap;
}

/* 닉네임/승급과 경험치 바 사이 여백 축소 */
.bottom-exp{
  grid-column:2 / 4 !important;
  grid-row:2 !important;
  padding-left:10px !important;
  margin-top:0 !important;
  gap:8px !important;
  align-self:start !important;
}

.bottom-exp-text{
  font-size:11px !important;
  line-height:1 !important;
}

.bottom-exp-bar{
  height:8px !important;
}

/* 하단 메뉴 패널은 줄어든 하단바 높이에 맞춰 위치 보정 */
.menu-panel{
  bottom:calc(var(--nav) - 1px + env(safe-area-inset-bottom)) !important;
}

/* 작은 화면에서는 더 압축 */
@media (max-width:380px){
  :root{
    --nav:84px;
  }

  .bottom-status{
    grid-template-columns:50px minmax(0,1fr) auto !important;
    grid-template-rows:32px 25px !important;
    padding-left:12px !important;
    padding-right:12px !important;
  }

  .bottom-cash{
    font-size:16px !important;
    letter-spacing:-.5px;
  }

  .bottom-info,
  .bottom-exp{
    padding-left:8px !important;
  }
}

function dayMs(){return 86400000}
function hourMs(){return 3600000}
function savingHours(p){return Math.max(1,Number((p&&p.hours)!=null?p.hours:p&&p.days)||1)}
function migrateSavingMaturities(x){
  try{
    var products=((x.bankProducts&&x.bankProducts.savings)||[]);
    (x.bankSavings||[]).forEach(function(sv){
      if(!sv||sv.termUnit==='hours')return;
      var p=products.find(function(pp){return pp.id===sv.productId})||{};
      var h=savingHours(p);
      if(sv.start&&sv.maturity){
        var oldGap=sv.maturity-sv.start;
        var hourGap=h*hourMs();
        if(oldGap>12*hourMs() && hourGap>0){
          sv.maturity=sv.start+hourGap;
        }
      }
      sv.termUnit='hours';
    });
  }catch(e){}
}

function savingDue(sv){return Math.round(sv.amount*(1+sv.rate/100))}
function loanTermHours(ln){var start=+ln.start||Date.now(),due=+ln.due||start+dayMs();return Math.max(1,Math.round((due-start)/hourMs()))}
function migrateLoanHourly(ln,now){now=now||Date.now();if(!ln||typeof ln!=='object')return ln;ln.amount=Math.max(0,Math.round(+ln.amount||0));ln.rate=+ln.rate||0;ln.overdueRate=+ln.overdueRate||0;if(!ln.start)ln.start=now;if(!ln.due)ln.due=ln.start+dayMs();var term=loanTermHours(ln),total=Math.round(ln.amount*(ln.rate/100)),hourly=Math.max(1,Math.round(total/term)),overHourly=Math.max(1,Math.round(ln.amount*(ln.overdueRate/100)/24));if(ln.interestMode!=='hourly'){ln.interestMode='hourly';ln.interestMigrated=true;ln.migrationAt=now;ln.totalBaseInterest=total;ln.hourlyBaseInterest=hourly;ln.hourlyOverdueInterest=overHourly;ln.paidBaseInterest=0;ln.paidOverdueInterest=0;ln.unpaidBaseInterest=0;ln.unpaidOverdueInterest=0;ln.lastInterestPaidAt=now;ln.nextInterestPaidAt=now+hourMs()}else{if(!isFinite(+ln.totalBaseInterest))ln.totalBaseInterest=total;if(!isFinite(+ln.hourlyBaseInterest))ln.hourlyBaseInterest=hourly;if(!isFinite(+ln.hourlyOverdueInterest))ln.hourlyOverdueInterest=overHourly;['paidBaseInterest','paidOverdueInterest','unpaidBaseInterest','unpaidOverdueInterest'].forEach(function(k){if(!isFinite(+ln[k]))ln[k]=0});if(!ln.lastInterestPaidAt)ln.lastInterestPaidAt=now;if(!ln.nextInterestPaidAt)ln.nextInterestPaidAt=(+ln.lastInterestPaidAt||now)+hourMs()}return ln}
function migrateAllLoans(now){ensureBank(state);var changed=false;(state.bankLoans||[]).forEach(function(ln){var before=ln.interestMode;migrateLoanHourly(ln,now||Date.now());if(before!==ln.interestMode)changed=true});return changed}
function loanBase(ln){migrateLoanHourly(ln);return Math.round((+ln.amount||0)+(+ln.totalBaseInterest||0))}
function overdueDays(ln){return Math.max(0,Math.ceil((Date.now()-(+ln.due||0))/dayMs()))}
function remainingBaseInterest(ln){migrateLoanHourly(ln);return Math.max(0,Math.round((+ln.totalBaseInterest||0)-(+ln.paidBaseInterest||0)-(+ln.unpaidBaseInterest||0)))}
function unpaidLoanInterest(ln){migrateLoanHourly(ln);return Math.max(0,Math.round((+ln.unpaidBaseInterest||0)+(+ln.unpaidOverdueInterest||0)))}

function payUnpaidLoanInterestFromAccount(){ensureBankAccount(state);var paid=0,now=Date.now();(state.bankLoans||[]).forEach(function(ln){migrateLoanHourly(ln,now);['Base','Overdue'].forEach(function(kind){var key='unpaid'+kind+'Interest',paidKey='paid'+kind+'Interest',need=Math.max(0,Math.round(+ln[key]||0));if(need<=0||state.bankAccountBalance<=0)return;var take=Math.min(need,Math.max(0,Math.round(state.bankAccountBalance||0)));state.bankAccountBalance=Math.max(0,Math.round((state.bankAccountBalance||0)-take));ln[key]=Math.max(0,Math.round(need-take));ln[paidKey]=Math.max(0,Math.round((+ln[paidKey]||0)+take));paid+=take})});if(paid>0){addBankAccountLog('loan_interest',paid,state.bankAccountBalance,now);state.bankVaultAccountSyncedBalance=Math.max(0,Math.round((+state.bankVaultAccountSyncedBalance||0)-paid));savePublicBankVaultAccountDeltaNow(-paid);addLoanInterestIncome(paid)}return paid}
function processLoanHourlyInterest(now){now=now||Date.now();ensureBank(state);ensureBankAccount(state);var totalPaid=0,changed=false;(state.bankLoans||[]).forEach(function(ln){migrateLoanHourly(ln,now);var guard=0;while((+ln.nextInterestPaidAt||0)<=now&&guard<240){guard++;var isOverdue=(+ln.nextInterestPaidAt||now)>(+ln.due||now);var dueAmt=Math.max(1,Math.round(isOverdue?(+ln.hourlyOverdueInterest||0):(+ln.hourlyBaseInterest||0)));var paidKey=isOverdue?'paidOverdueInterest':'paidBaseInterest',unpaidKey=isOverdue?'unpaidOverdueInterest':'unpaidBaseInterest';if(state.bankAccountBalance>0){var take=Math.min(dueAmt,Math.max(0,Math.round(state.bankAccountBalance||0)));state.bankAccountBalance=Math.max(0,Math.round((state.bankAccountBalance||0)-take));ln[paidKey]=Math.max(0,Math.round((+ln[paidKey]||0)+take));totalPaid+=take;if(take<dueAmt)ln[unpaidKey]=Math.max(0,Math.round((+ln[unpaidKey]||0)+(dueAmt-take)))}else{ln[unpaidKey]=Math.max(0,Math.round((+ln[unpaidKey]||0)+dueAmt))}ln.lastInterestPaidAt=+ln.nextInterestPaidAt||now;ln.nextInterestPaidAt=(+ln.lastInterestPaidAt||now)+hourMs();changed=true}});if(totalPaid>0){addBankAccountLog('loan_interest',totalPaid,state.bankAccountBalance,now);state.bankVaultAccountSyncedBalance=Math.max(0,Math.round((+state.bankVaultAccountSyncedBalance||0)-totalPaid));savePublicBankVaultAccountDeltaNow(-totalPaid);addLoanInterestIncome(totalPaid)}return changed||totalPaid>0}

function firebaseCleanValue(v){
  if(v===undefined)return undefined;
  if(typeof v==='number')return isFinite(v)?v:0;
  if(v===null||typeof v==='string'||typeof v==='boolean')return v;
  if(Array.isArray(v)){
    var a=[];v.forEach(function(x){var c=firebaseCleanValue(x);if(c!==undefined)a.push(c)});return a;
  }
  if(typeof v==='object'){
    var o={};Object.keys(v).forEach(function(k){var c=firebaseCleanValue(v[k]);if(c!==undefined)o[k]=c});return o;
  }
  return v;
}

function confirmLoan(id){var p=byId(state.bankProducts.loans,id),amt=Math.floor(+$('bankAmountInput').value||0),avail=bankAvailable();if(!p||amt<=0){msg('금액을 정확히 입력해주세요');return}if(avail<=0||amt>avail){msg('은행 대출 가능 금액이 부족해요');return}var now=Date.now(),rate=effectiveLoanRate(p.rate),overdue=effectiveOverdueRate(p.overdueRate),due=now+p.days*dayMs(),termHours=Math.max(1,Math.round((due-now)/hourMs())),totalInterest=Math.round(amt*(rate/100));state.cash+=amt;addBankCash(-amt);ensureBankVault(state);state.bankVault.totalLoanAmount=Math.max(0,Math.round((+state.bankVault.totalLoanAmount||0)+amt));state.bankVault.totalBankAssets=calcBankVaultTotal(state.bankVault);savePublicBankVaultLoanDeltaNow(amt,-amt);state.bankLoans.push({id:'ln'+now+Math.random().toString(36).slice(2,5),productId:p.id,productName:p.name,amount:amt,rate:rate,overdueRate:overdue,start:now,due:due,interestMode:'hourly',interestMigrated:true,migrationAt:now,totalBaseInterest:totalInterest,hourlyBaseInterest:Math.max(1,Math.round(totalInterest/termHours)),hourlyOverdueInterest:Math.max(1,Math.round(amt*(overdue/100)/24)),paidBaseInterest:0,paidOverdueInterest:0,unpaidBaseInterest:0,unpaidOverdueInterest:0,lastInterestPaidAt:now,nextInterestPaidAt:now+hourMs()});close();draw();msg('대출이 실행됐어요')}

function notificationHistoryHtml(){ensureNotificationLogs(state);var logs=(state.notificationLogs||[]).slice().sort(function(a,b){return (b.createdAt||0)-(a.createdAt||0)}),per=5,totalPages=Math.max(1,Math.ceil(logs.length/per));if(!state.notificationLogPage||state.notificationLogPage<1)state.notificationLogPage=1;if(state.notificationLogPage>totalPages)state.notificationLogPage=totalPages;var page=state.notificationLogPage,start=(page-1)*per,pageLogs=logs.slice(start,start+per);var html='<div class="notice-history-title">발송 기록</div>';if(!logs.length){return html+'<div class="empty notice-history-empty">아직 발송한 알림이 없어요.</div>'}html+='<div class="notice-history-list">'+pageLogs.map(function(n){var isGift=n.type==='gift';var target=+n.targetCount||0,success=(n.successCount!=null?+n.successCount:target),fail=+n.failCount||0;var statusText=notificationStatusText(n);var failedHtml='';if(fail>0&&n.failedUsers&&n.failedUsers.length){failedHtml='<div class="notice-history-content">실패 유저: '+n.failedUsers.slice(0,5).map(function(u){return esc((u.name||u.email||u.id||'알 수 없음')+(u.email&&u.name?' / '+u.email:''))}).join(', ')+(n.failedUsers.length>5?' 외 '+(n.failedUsers.length-5)+'명':'')+'</div>'}var recallHtml='';if(n.status==='recalled'){recallHtml='<div class="notice-history-content">회수 결과: 삭제 '+(+n.recallRemovedCount||0)+'명'+((+n.recallReceivedCount||0)>0?' · 이미 수령 '+(+n.recallReceivedCount||0)+'명':'')+'</div>'}var actions='<div class="notice-history-actions">';if(notificationCanRecall(n)){actions+='<button class="table-btn" data-recallnotice="'+esc(n.id)+'">회수</button>'}if(notificationCanDeleteRecord(n)){actions+='<button class="table-btn danger" data-deletenotice="'+esc(n.id)+'">기록 삭제</button>'}actions+='</div>';return '<div class="notice-history-row"><div class="notice-history-head"><span class="notice-history-date">'+dateText(n.createdAt)+'</span><span class="mail-badge '+mailTypeClass(n.type)+'">'+mailTypeLabel(n.type)+'</span></div><div class="notice-history-title-text">'+esc(n.title||'-')+'</div><div class="notice-history-content">'+esc(n.content||n.summary||'')+'</div>'+(isGift?'<div class="notice-history-amount">선물 금액 '+won(n.amount||0)+'</div>':'')+'<div class="notice-history-target">대상: '+(n.targetType==='selected'?'개별 '+target+'명'+(n.targetNicknames&&n.targetNicknames.length?' · '+esc(n.targetNicknames.slice(0,3).join(', '))+(n.targetNicknames.length>3?' 외 '+(n.targetNicknames.length-3)+'명':''):''):'전체')+'</div><div class="notice-history-status '+(n.status==='recalled'?'recalled':(n.status==='failed'?'failed':''))+'">발송 대상 '+target+'명 · 성공 '+success+'명 · 실패 '+fail+'명 · 상태: '+statusText+'</div>'+failedHtml+recallHtml+actions+'</div>'}).join('')+'</div>';if(logs.length>per){var groupStart=Math.floor((page-1)/5)*5+1,groupEnd=Math.min(totalPages,groupStart+4),prev=Math.max(1,groupStart-5),next=Math.min(totalPages,groupStart+5);html+='<div class="bank-log-pages notice-history-pages"><button class="bank-page-btn '+(groupStart<=1?'disabled':'')+'" '+(groupStart<=1?'':'data-notificationpage="'+prev+'"')+'>&lt;</button>';for(var i=groupStart;i<=groupEnd;i++){html+='<button class="bank-page-btn '+(i===page?'on':'')+'" data-notificationpage="'+i+'">'+i+'</button>'}html+='<button class="bank-page-btn '+(groupEnd>=totalPages?'disabled':'')+'" '+(groupEnd>=totalPages?'':'data-notificationpage="'+next+'"')+'>&gt;</button></div>'}return html}

function removeBroadcastMailFromGame(g,log){if(!g||typeof g!=='object')g={};if(!Array.isArray(g.mails))g.mails=[];var removed=0,received=0,kept=[];(g.mails||[]).forEach(function(m){var same=!!(m&&(m.broadcastId===log.broadcastId||(log.mailId&&m.id===log.mailId)));if(!same){kept.push(m);return}if(m.type==='gift'&&m.isReceived){received++;kept.push(m);return}removed++});g.mails=kept;return{gameData:g,removed:removed,received:received}}
function recallNotificationLog(id){var log=notificationLogById(id);if(!log){msg('기록을 찾을 수 없어요');return}if(!log.broadcastId){deleteNotificationLog(id);return}if(log.status==='recalled'){msg('이미 회수된 발송 건이에요');return}msg('우편 회수 중...');function finalize(removed,received,total,failed){log.status='recalled';log.recalledAt=Date.now();log.recallRemovedCount=removed||0;log.recallReceivedCount=received||0;log.recallTargetCount=total||0;if(failed&&failed.length)log.recallFailedUsers=failed;persistNotificationLogs();close();drawSettings();updateMailboxIndicators();msg('회수 완료 · 삭제 '+(removed||0)+'명'+((received||0)>0?' · 이미 수령 '+received+'명':''))}if(!fbEnabled||!fbUser||!fbDb||!isAdmin){var r=removeBroadcastMailFromGame(state,log);finalize(r.removed,r.received,1,[]);return}return fbDb.collection('users').get().then(function(snap){var tasks=[],removed=0,received=0,total=0,failed=[];snap.forEach(function(doc){var d=doc.data()||{},g=d.gameData||{};if(!g||!g.joined)return;total++;var r=removeBroadcastMailFromGame(JSON.parse(JSON.stringify(g)),log);removed+=r.removed;received+=r.received;if(r.removed>0){if(doc.id===fbUser.uid){state.mails=r.gameData.mails;tasks.push(saveFirebaseNow().catch(function(e){failed.push({id:doc.id,reason:e&&e.message?e.message:String(e)})}))}else{tasks.push(doc.ref.update({'gameData.mails':firebaseCleanValue(r.gameData.mails||[]),updatedAt:firebase.firestore.FieldValue.serverTimestamp(),updatedAtMs:Date.now()}).catch(function(e){failed.push({id:doc.id,reason:e&&e.message?e.message:String(e)})}))}}});return Promise.all(tasks).then(function(){finalize(removed,received,total,failed)})}).catch(function(e){console.warn('recall notification failed',e);msg('우편 회수 실패')})}
